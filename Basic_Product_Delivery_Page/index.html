<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
  </head>
  <body>
    <label for="optInCheckbox">Select delivery type:</label>
    <br />
    <input type="checkbox" id="optInCheckbox" /> Prime-day
    <p id="optInResult"></p>

    <label>Choose Laptop processor:</label>
    <br />
    <input type="checkbox" name="toppings" value="Core i3" /> Core i3
    <input type="checkbox" name="toppings" value="Core i5" /> Core i5
    <input type="checkbox" name="toppings" value="Core i7" /> Core i7
    <p id="toppingsResult"></p>

    <label>Choose your preferred operating system:</label>
    <br />
    <input type="checkbox" name="languages" value="Windows" /> Windows
    <br />
    <input type="checkbox" name="languages" value="Ubuntu" /> Ubuntu <br />
    <input type="checkbox" name="languages" value="Linux" /> Linux <br />
    <p id="languageResult"></p>

    <script>
      const optInCheckbox = document.getElementById('optInCheckbox');
      const optInResult = document.getElementById('optInResult');

      optInCheckbox.addEventListener('change', function () {
        if (optInCheckbox.checked) {
          optInResult.textContent = 'You will receive your product next day.';
        } else {
          optInResult.textContent =
            'You will receive your product in 4 - 5 days.';
        }
      });

      const toppingCheckBoxes = document.getElementsByName('toppings');
      const toppingsResult = document.getElementById('toppingsResult');

      for (let i = 0; i < toppingCheckBoxes.length; i++) {
        toppingCheckBoxes[i].addEventListener('change', function () {
          const selectedToppings = [];

          for (let j = 0; j < toppingCheckBoxes.length; j++) {
            if (toppingCheckBoxes[j].checked) {
              selectedToppings.push(toppingCheckBoxes[j].value);
            }
          }

          // console.log(selectedToppings)

          toppingsResult.textContent = `Selected processor: ${selectedToppings.join(
            ', '
          )}`;
        });
      }
      const languageCheckboxes = document.getElementsByName('languages');
      const languageResult = document.getElementById('languageResult');

      for (let i = 0; i < languageCheckboxes.length; i++) {
        languageCheckboxes[i].addEventListener('change', function () {
          const selectedLanguages = [];

          for (let j = 0; j < languageCheckboxes.length; j++) {
            if (languageCheckboxes[j].checked) {
              selectedLanguages.push(languageCheckboxes[j].value);
            }
          }

          languageResult.textContent = `Selected operating system: ${selectedLanguages.join(
            ', '
          )}`;
        });
      }
    </script>
  </body>
</html>
